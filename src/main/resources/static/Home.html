<!DOCTYPE html>
<html lang="">
<head>
    <title>StayEase - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141E30, #243B55);
            color: white;
        }

        /* Navbar */
        .navbar {
            background-color: #111;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .nav-buttons a {
            text-decoration: none;
            padding: 8px 15px;
            margin-left: 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        .login {
            border: 1px solid white;
            color: white;
        }

        .register {
            background-color: orange;
            color: black;
        }

        /* Hero Section */
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .hero a {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            background-color: orange;
            color: black;
            font-weight: bold;
        }

        /* Footer */
        .footer {
            background-color: #111;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>StayEase</h2>
    <div class="nav-buttons">
        <a href="/login" class="login">Login</a>
        <a href="/register" class="register">Register</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Find Your Perfect Stay</h1>
    <p>Book hotels easily and enjoy a smooth experience.</p>
    <a href="/hotels">Explore Hotels</a>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 StayEase | All Rights Reserved</p>
</div>

</body>
</html>
