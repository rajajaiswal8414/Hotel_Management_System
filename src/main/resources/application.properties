spring.application.name=airBnb

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.context-path=/api/v1

# Security Configuration
jwt.secret=mySecretKey123912738aopsgjnspkmndfsopkvajoirjg94gf2bowing2okay
jwt.expiration-ms=3000000
# Refresh token expiration (7 days)
jwt.refresh-expiration-ms=604800000

spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/v1/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

deploy.env = development

